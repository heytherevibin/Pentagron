# Optional observability stack
# Usage: docker-compose -f docker-compose.yml -f docker-compose.observability.yml up

services:
  grafana:
    image: grafana/grafana:latest
    container_name: pentagron-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/agent-metrics.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - pentagron-core

  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: pentagron-langfuse
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pentagron}:${POSTGRES_PASSWORD:-pentagron}@postgres:5432/${POSTGRES_DB:-pentagron}
      - NEXTAUTH_SECRET=${JWT_SECRET:-changeme}
      - SALT=${JWT_SECRET:-changeme}
    depends_on:
      - postgres
    networks:
      - pentagron-core

volumes:
  grafana-data:
